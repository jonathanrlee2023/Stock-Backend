stages:
  - lint
  - test

cache:
  key:
    files:
      - Go_Backend/go.sum
      - Python_Streamer/requirements.txt
  paths:
    - Go_Backend/.go-cache/
    - Python_Streamer/.pip-cache/

go:lint:
  stage: lint
  image: golang:1.25-bookworm
  script:
    - cd Go_Backend
    - go vet ./...
  only:
    changes:
      - Go_Backend/**/*

go:security:
  stage: lint
  image: golang:1.25-bookworm
  script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - cd Go_Backend
    - govulncheck ./...
  only:
    changes:
      - Go_Backend/**/*

go:test:
  stage: test
  image: golang:1.25-bookworm
  variables:
    GOPATH: $CI_PROJECT_DIR/Go_Backend/.go-cache
    CGO_ENABLED: "1"
  script:
    - cd Go_Backend
    - go test ./... -race -timeout 60s -cover
  coverage: '/coverage: (\d+\.\d+)%/'
  only:
    changes:
      - Go_Backend/**/*

python:lint:
  stage: lint
  image: python:3.13-slim
  script:
    - pip install ruff --quiet
    - ruff check Python_Streamer/
  only:
    changes:
      - Python_Streamer/**/*

python:security:
  stage: lint
  image: python:3.13-slim
  script:
    - pip install pip-audit -q
    - pip-audit -r Python_Streamer/requirements.txt
  only:
    changes:
      - Python_Streamer/**/*

python:test:
  stage: test
  image: python:3.13-slim
  variables:
    PIP_CACHE_DIR: $CI_PROJECT_DIR/Python_Streamer/.pip-cache
    PYTHONPATH: $CI_PROJECT_DIR/Python_Streamer
  before_script:
    - cd Python_Streamer
    - pip install --cache-dir $PIP_CACHE_DIR -r requirements.txt -r requirements-dev.txt -q
  script:
    - pytest tests/ -v --tb=short --asyncio-mode=auto
  only:
    changes:
      - Python_Streamer/**/*
