[tool.pyright]
# Match schwabStream.py / conftest.py sys.path so local modules resolve (backtesting, appState, cache, …).
extraPaths = ["backtest", "core", "company", "streaming"]

[tool.ruff]
# Increase line length to 120 (standard is 88)
line-length = 120

[tool.ruff.lint]
# Select the rules you want (E = Error, F = Pyflakes)
select = ["E", "F"]
# Ignore specific annoying ones for now
ignore = [
    "F401", # Unused imports (we're still coding!)
    "F841", # Unused variables
    "E501", # Line length (our mocks are huge)
]

[tool.ruff.lint.per-file-ignores]
# Be even lazier in the tests folder
"tests/*" = ["F841", "E501", "E402"]
# sys.path must be adjusted before local package imports
"schwabStream.py" = ["E402"]